<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>тренировка тега picture </title>
    <style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f0f0f0;
  }
  picture {
    max-width: 100%;
    padding: 20px;
  }
  img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
    <picture>
        <source media="(max-width: 1000px)" src="https://dummyimage.com/600x400/f723d0/fff&text=%D0%BA%D0%B2%D0%B0%D0%B4%D1%80%D0%B0%D1%82">
        <img src="https://dummyimage.com/600x400/f723d0/fff&text=%D0%BA%D0%B2%D0%B0%D0%B4%D1%80%D0%B0%D1%82" alt="квадрат">
    </picture>
</body>
</html>
